apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  {{- include "rick-and-morty.name" . | nindent 2 }}
  {{- include "rick-and-morty.namespace" . | nindent 2 }}
  annotations:
    {{- with .Values.ingress.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.app.name }}
                port:
                  number: {{ .Values.service.port }}
