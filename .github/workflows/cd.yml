name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  cd:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: kind

      - name: Pull image from DockerHub
        run: docker pull adimalka/rick-and-morty-api:latest

      - name: Load image into kind cluster
        run: kind load docker-image adimalka/rick-and-morty-api:latest

      - name: Deploy with Helm
        run: |
          helm install rick-and-morty ./helm/rick-and-morty \
            -n rick-and-morty --create-namespace \
            --set image.tag=latest \
            --set image.pullPolicy=Never

      - name: Wait for deployment
        run: kubectl rollout status deployment/rick-and-morty-api -n rick-and-morty

      - name: Test endpoints
        run: |
          kubectl port-forward svc/rick-and-morty-api 3000:80 -n rick-and-morty &
          sleep 3
          curl -f http://localhost:3000/healthcheck
          curl -f http://localhost:3000/data
